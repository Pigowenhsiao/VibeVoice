openapi: 3.1.0
info:
  title: VibeVoice Local Runtime API
  version: 1.0.0
  summary: Loopback-only API contract for the Windows desktop shell.
servers:
  - url: http://127.0.0.1:8765
paths:
  /health:
    get:
      summary: Check runtime health
      operationId: getHealth
      responses:
        "200":
          description: Runtime health summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /models:
    get:
      summary: Get current model status
      operationId: listModels
      responses:
        "200":
          description: Model summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelListResponse"
  /models/load:
    post:
      summary: Load a model into the local runtime
      operationId: loadModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoadModelRequest"
      responses:
        "200":
          description: Model load accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelActionResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /voices:
    get:
      summary: List available voice presets
      operationId: listVoices
      responses:
        "200":
          description: Voice preset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceListResponse"
  /jobs/generate:
    post:
      summary: Create a generation job
      operationId: createGenerationJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateJobRequest"
      responses:
        "202":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateJobResponse"
        "400":
          description: Invalid generation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /jobs/{jobId}:
    get:
      summary: Get job state
      operationId: getJob
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /jobs/{jobId}/stop:
    post:
      summary: Request stop for a running job
      operationId: stopJob
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Stop requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobActionResponse"
        "404":
          description: Job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /jobs/{jobId}/artifact:
    get:
      summary: Get final artifact metadata for a completed job
      operationId: getJobArtifact
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Artifact metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactResponse"
        "404":
          description: Artifact or job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - runtime_version
        - runtime
        - model
      properties:
        status:
          type: string
          enum: [ok, degraded, error]
        runtime_version:
          type: string
        runtime:
          $ref: "#/components/schemas/RuntimeInfo"
        model:
          $ref: "#/components/schemas/ModelInfo"
    RuntimeInfo:
      type: object
      required:
        - device
        - python_version
      properties:
        device:
          type: string
        python_version:
          type: string
        ffmpeg_available:
          type: boolean
        checkpoints_root:
          type: string
    ModelInfo:
      type: object
      required:
        - loaded
        - status
      properties:
        id:
          type: string
        path:
          type: string
        loaded:
          type: boolean
        status:
          type: string
          enum: [unloaded, loading, loaded, failed]
        device:
          type: string
        message:
          type: string
    ModelListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"
    LoadModelRequest:
      type: object
      required:
        - model_path
      properties:
        model_path:
          type: string
        inference_steps:
          type: integer
          minimum: 1
          default: 10
    ModelActionResponse:
      type: object
      required:
        - accepted
        - model
      properties:
        accepted:
          type: boolean
        model:
          $ref: "#/components/schemas/ModelInfo"
    VoicePreset:
      type: object
      required:
        - id
        - display_name
        - path
      properties:
        id:
          type: string
        display_name:
          type: string
        path:
          type: string
        language_hint:
          type: string
    VoiceListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/VoicePreset"
    GenerateJobRequest:
      type: object
      required:
        - speaker_count
        - speakers
        - script
      properties:
        speaker_count:
          type: integer
          minimum: 1
          maximum: 4
        speakers:
          type: array
          minItems: 1
          maxItems: 4
          items:
            type: object
            required:
              - slot
              - voice_id
            properties:
              slot:
                type: integer
                minimum: 1
                maximum: 4
              voice_id:
                type: string
        script:
          type: string
          minLength: 1
        cfg_scale:
          type: number
          minimum: 1.0
          maximum: 2.0
          default: 1.3
        output_dir:
          type: string
    CreateJobResponse:
      type: object
      required:
        - accepted
        - job
      properties:
        accepted:
          type: boolean
        job:
          $ref: "#/components/schemas/Job"
    Job:
      type: object
      required:
        - id
        - state
        - progress
        - created_at
        - updated_at
      properties:
        id:
          type: string
        state:
          type: string
          enum: [queued, loading, running, stopping, completed, failed, cancelled]
        progress:
          type: number
          minimum: 0
          maximum: 1
        message:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        artifact_path:
          type: string
        error:
          $ref: "#/components/schemas/ErrorDetail"
    JobResponse:
      type: object
      required:
        - job
      properties:
        job:
          $ref: "#/components/schemas/Job"
    JobActionResponse:
      type: object
      required:
        - accepted
        - job
      properties:
        accepted:
          type: boolean
        job:
          $ref: "#/components/schemas/Job"
    ArtifactResponse:
      type: object
      required:
        - job_id
        - path
        - format
      properties:
        job_id:
          type: string
        path:
          type: string
        format:
          type: string
          enum: [wav]
        duration_seconds:
          type: number
    ErrorDetail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        detail:
          type: string
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
